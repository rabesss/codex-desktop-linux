name: Codespell

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codespell:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install codespell
        run: python -m pip install --upgrade codespell
      - name: Run codespell
        run: |
          codespell \
            README.md \
            SUPPORTED.md \
            RELEASING.md \
            SECURITY.md \
            docs \
            .github \
            install.sh \
            scripts/build-deb.sh \
            scripts/build-rpm.sh \
            scripts/build-pacman.sh \
            scripts/build-appimage.sh \
            scripts/ci \
            tests/test-package-artifact.sh
