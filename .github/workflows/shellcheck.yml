name: Shellcheck

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "**/*.sh"
      - "install.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Check maintained shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: bash scripts/ci/run-shellcheck.sh
